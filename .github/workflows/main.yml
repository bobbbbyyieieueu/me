name: Build NovaBrowser Pro Dev APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create phone-first Android dev browser
        run: |
          mkdir -p app/src/main/java/com/nova/browser
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)

              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "NovaBrowserProDev"

          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.nova.browser'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.nova.browser'
                  minSdk 23
                  targetSdk 35
                  versionCode 3
                  versionName '3.0-pro-dev'
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="NovaBrowser Pro Dev"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />

                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />

                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />

                          <data android:scheme="http" />
                          <data android:scheme="https" />
                      </intent-filter>

                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/nova/browser/MainActivity.java <<'EOF'
          package com.nova.browser;

          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.webkit.ConsoleMessage;
          import android.webkit.DownloadListener;
          import android.webkit.JavascriptInterface;
          import android.webkit.URLUtil;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebResourceResponse;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.HorizontalScrollView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.util.ArrayList;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private WebView webView;
              private EditText addressBar;
              private FrameLayout root;
              private LinearLayout devSheet;
              private TextView panelOutput;
              private TextView panelTitle;
              private EditText jsInput;

              private final ArrayList<String> consoleLogs = new ArrayList<>();
              private final ArrayList<String> networkLogs = new ArrayList<>();

              private boolean adBlockEnabled = true;
              private boolean desktopMode = false;

              @SuppressLint({"SetJavaScriptEnabled","AddJavascriptInterface"})
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  WebView.setWebContentsDebuggingEnabled(true);

                  root = new FrameLayout(this);

                  LinearLayout browser = new LinearLayout(this);
                  browser.setOrientation(LinearLayout.VERTICAL);

                  LinearLayout topBar = new LinearLayout(this);
                  topBar.setOrientation(LinearLayout.HORIZONTAL);
                  topBar.setBackgroundColor(Color.rgb(24,24,24));
                  topBar.setPadding(6,6,6,6);

                  Button home = button("⌂");
                  Button reload = button("↻");

                  addressBar = new EditText(this);
                  addressBar.setText("https://google.com");
                  addressBar.setSingleLine(true);
                  addressBar.setTextColor(Color.WHITE);
                  addressBar.setHintTextColor(Color.GRAY);
                  addressBar.setBackgroundColor(Color.rgb(50,50,50));

                  Button go = button("Go");

                  topBar.addView(home,new LinearLayout.LayoutParams(100,100));
                  topBar.addView(reload,new LinearLayout.LayoutParams(100,100));
                  topBar.addView(addressBar,new LinearLayout.LayoutParams(0,100,1));
                  topBar.addView(go,new LinearLayout.LayoutParams(120,100));

                  webView = new WebView(this);

                  LinearLayout bottomBar = new LinearLayout(this);
                  bottomBar.setOrientation(LinearLayout.HORIZONTAL);
                  bottomBar.setBackgroundColor(Color.rgb(18,18,18));

                  Button back = button("Back");
                  Button forward = button("Forward");
                  Button dev = button("DEV");
                  Button desktop = button("Desktop");

                  bottomBar.addView(back,new LinearLayout.LayoutParams(0,120,1));
                  bottomBar.addView(forward,new LinearLayout.LayoutParams(0,120,1));
                  bottomBar.addView(dev,new LinearLayout.LayoutParams(0,120,1));
                  bottomBar.addView(desktop,new LinearLayout.LayoutParams(0,120,1));

                  browser.addView(topBar,new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  ));

                  browser.addView(webView,new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          0,
                          1
                  ));

                  browser.addView(bottomBar,new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  ));

                  root.addView(browser);

                  devSheet = createDevPanel();

                  FrameLayout.LayoutParams sheetParams =
                          new FrameLayout.LayoutParams(
                                  ViewGroup.LayoutParams.MATCH_PARENT,
                                  900
                          );

                  sheetParams.gravity = Gravity.BOTTOM;

                  devSheet.setVisibility(View.GONE);

                  root.addView(devSheet,sheetParams);

                  setContentView(root);

                  configureWebView();

                  home.setOnClickListener(v -> webView.loadUrl("https://google.com"));

                  reload.setOnClickListener(v -> webView.reload());

                  go.setOnClickListener(v -> loadInput());

                  addressBar.setOnEditorActionListener((v,actionId,event)->{
                      loadInput();
                      return true;
                  });

                  back.setOnClickListener(v -> {
                      if(webView.canGoBack()) webView.goBack();
                  });

                  forward.setOnClickListener(v -> {
                      if(webView.canGoForward()) webView.goForward();
                  });

                  dev.setOnClickListener(v -> {
                      if(devSheet.getVisibility()==View.VISIBLE){
                          devSheet.setVisibility(View.GONE);
                      } else {
                          devSheet.setVisibility(View.VISIBLE);
                      }
                  });

                  desktop.setOnClickListener(v -> {
                      desktopMode=!desktopMode;

                      if(desktopMode){
                          webView.getSettings().setUserAgentString(
                                  "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/125 Safari/537.36"
                          );
                      } else {
                          webView.getSettings().setUserAgentString(null);
                      }

                      webView.reload();
                  });

                  webView.loadUrl("https://google.com");
              }

              private LinearLayout createDevPanel(){

                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setBackgroundColor(Color.rgb(10,10,10));

                  panelTitle = new TextView(this);
                  panelTitle.setText("Developer Tools");
                  panelTitle.setTextColor(Color.WHITE);
                  panelTitle.setTextSize(18);

                  panelOutput = new TextView(this);
                  panelOutput.setTextColor(Color.GREEN);
                  panelOutput.setTextSize(11);

                  ScrollView scroll = new ScrollView(this);
                  scroll.addView(panelOutput);

                  jsInput = new EditText(this);
                  jsInput.setHint("JavaScript");
                  jsInput.setTextColor(Color.WHITE);
                  jsInput.setHintTextColor(Color.GRAY);
                  jsInput.setBackgroundColor(Color.rgb(40,40,40));

                  LinearLayout tabs = new LinearLayout(this);

                  Button console = button("Console");
                  Button network = button("Network");
                  Button dom = button("DOM");
                  Button runJs = button("Run JS");

                  tabs.addView(console,new LinearLayout.LayoutParams(0,120,1));
                  tabs.addView(network,new LinearLayout.LayoutParams(0,120,1));
                  tabs.addView(dom,new LinearLayout.LayoutParams(0,120,1));
                  tabs.addView(runJs,new LinearLayout.LayoutParams(0,120,1));

                  console.setOnClickListener(v -> showConsole());

                  network.setOnClickListener(v -> showNetwork());

                  dom.setOnClickListener(v -> inspectDom());

                  runJs.setOnClickListener(v -> runJavaScript());

                  panel.addView(panelTitle);
                  panel.addView(tabs);
                  panel.addView(scroll,new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          0,
                          1
                  ));
                  panel.addView(jsInput);

                  return panel;
              }

              private void configureWebView(){

                  WebSettings s = webView.getSettings();

                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setBuiltInZoomControls(true);
                  s.setDisplayZoomControls(false);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.addJavascriptInterface(new DevBridge(),"NovaDev");

                  webView.setWebViewClient(new WebViewClient(){

                      @Override
                      public WebResourceResponse shouldInterceptRequest(
                              WebView view,
                              WebResourceRequest request
                      ){

                          String url = request.getUrl().toString();

                          networkLogs.add(url);

                          if(adBlockEnabled && isBlocked(url)){
                              return new WebResourceResponse(
                                      "text/plain",
                                      "utf-8",
                                      null
                              );
                          }

                          return super.shouldInterceptRequest(view,request);
                      }

                      @Override
                      public void onPageFinished(WebView view,String url){
                          addressBar.setText(url);

                          injectHooks();

                          super.onPageFinished(view,url);
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient(){

                      @Override
                      public boolean onConsoleMessage(ConsoleMessage msg){

                          consoleLogs.add(
                                  msg.messageLevel()+": "+msg.message()
                          );

                          return true;
                      }
                  });

                  webView.setDownloadListener(new DownloadListener(){

                      @Override
                      public void onDownloadStart(
                              String url,
                              String userAgent,
                              String contentDisposition,
                              String mimetype,
                              long contentLength
                      ){

                          try{

                              DownloadManager.Request request =
                                      new DownloadManager.Request(Uri.parse(url));

                              request.setMimeType(mimetype);

                              request.setDestinationInExternalPublicDir(
                                      Environment.DIRECTORY_DOWNLOADS,
                                      URLUtil.guessFileName(
                                              url,
                                              contentDisposition,
                                              mimetype
                                      )
                              );

                              DownloadManager manager =
                                      (DownloadManager)getSystemService(
                                              Context.DOWNLOAD_SERVICE
                                      );

                              manager.enqueue(request);

                              Toast.makeText(
                                      MainActivity.this,
                                      "Download started",
                                      Toast.LENGTH_SHORT
                              ).show();

                          } catch(Exception e){
                              consoleLogs.add("DOWNLOAD ERROR "+e.getMessage());
                          }
                      }
                  });
              }

              private void injectHooks(){

                  String js =
                          "(function(){" +
                                  "if(window.__nova)return;" +
                                  "window.__nova=true;" +

                                  "var l=console.log;" +
                                  "console.log=function(){" +
                                  "try{NovaDev.console(Array.from(arguments).join(' '));}catch(e){}" +
                                  "l.apply(console,arguments);" +
                                  "};" +

                                  "var f=window.fetch;" +
                                  "if(f){" +
                                  "window.fetch=function(){" +
                                  "try{NovaDev.network(arguments[0]);}catch(e){}" +
                                  "return f.apply(this,arguments);" +
                                  "}" +
                                  "}" +

                                  "})();";

                  webView.evaluateJavascript(js,null);
              }

              private void loadInput(){

                  String input =
                          addressBar.getText()
                                  .toString()
                                  .trim();

                  if(input.isEmpty()) return;

                  if(input.contains(".") && !input.contains(" ")){

                      if(
                              !input.startsWith("http://")
                                      && !input.startsWith("https://")
                      ){
                          input="https://"+input;
                      }

                  } else {

                      input =
                              "https://www.google.com/search?q="
                                      + Uri.encode(input);
                  }

                  webView.loadUrl(input);
              }

              private void showConsole(){

                  StringBuilder b = new StringBuilder();

                  for(String s:consoleLogs){
                      b.append(s).append("\n");
                  }

                  panelOutput.setText(b.toString());
              }

              private void showNetwork(){

                  StringBuilder b = new StringBuilder();

                  for(String s:networkLogs){
                      b.append(s).append("\n");
                  }

                  panelOutput.setText(b.toString());
              }

              private void inspectDom(){

                  webView.evaluateJavascript(
                          "(function(){return document.documentElement.outerHTML.substring(0,4000);})()",
                          value -> panelOutput.setText(clean(value))
                  );
              }

              private void runJavaScript(){

                  String code =
                          jsInput.getText()
                                  .toString()
                                  .trim();

                  if(code.isEmpty()) return;

                  webView.evaluateJavascript(
                          "(function(){try{return String("+code+");}catch(e){return 'ERROR '+e.message;}})();",
                          value -> panelOutput.setText(clean(value))
                  );
              }

              private boolean isBlocked(String url){

                  String u = url.toLowerCase(Locale.US);

                  return u.contains("doubleclick")
                          || u.contains("analytics")
                          || u.contains("tracking")
                          || u.contains("googlesyndication");
              }

              private String clean(String s){

                  if(s==null) return "";

                  if(s.startsWith("\"") && s.endsWith("\"")){
                      s=s.substring(1,s.length()-1);
                  }

                  return s
                          .replace("\\n","\n")
                          .replace("\\\"","\"");
              }

              private Button button(String text){

                  Button b = new Button(this);

                  b.setText(text);
                  b.setAllCaps(false);
                  b.setTextColor(Color.WHITE);
                  b.setBackgroundColor(Color.rgb(45,45,45));

                  return b;
              }

              @Override
              public void onBackPressed(){

                  if(devSheet!=null && devSheet.getVisibility()==View.VISIBLE){

                      devSheet.setVisibility(View.GONE);

                  } else if(webView!=null && webView.canGoBack()){

                      webView.goBack();

                  } else {

                      super.onBackPressed();
                  }
              }

              public class DevBridge {

                  @JavascriptInterface
                  public void console(String msg){
                      consoleLogs.add(msg);
                  }

                  @JavascriptInterface
                  public void network(String msg){
                      networkLogs.add(msg);
                  }
              }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaBrowserProDev-debug-apk
          path: app/build/outputs/apk/debug/*.apk
