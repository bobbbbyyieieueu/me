name: Build NovaBrowser Dev APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create Android dev browser project
        run: |
          mkdir -p app/src/main/java/com/nova/browser
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "NovaBrowserDev"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.nova.browser'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.nova.browser'
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName '2.0-dev'
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="NovaBrowser Dev"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/nova/browser/MainActivity.java <<'EOF'
          package com.nova.browser;

          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.webkit.ConsoleMessage;
          import android.webkit.DownloadListener;
          import android.webkit.URLUtil;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebResourceResponse;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private WebView webView;
              private EditText addressBar;
              private LinearLayout devPanel;
              private TextView logView;
              private EditText jsInput;
              private final ArrayList<String> logs = new ArrayList<>();
              private boolean adBlockEnabled = true;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  WebView.setWebContentsDebuggingEnabled(true);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);

                  LinearLayout toolbar = new LinearLayout(this);
                  toolbar.setOrientation(LinearLayout.HORIZONTAL);
                  toolbar.setGravity(Gravity.CENTER_VERTICAL);

                  Button back = smallButton("‹");
                  Button forward = smallButton("›");
                  Button reload = smallButton("↻");
                  Button home = smallButton("⌂");
                  Button dev = smallButton("DEV");

                  addressBar = new EditText(this);
                  addressBar.setSingleLine(true);
                  addressBar.setText("https://google.com");

                  Button go = smallButton("Go");

                  toolbar.addView(back);
                  toolbar.addView(forward);
                  toolbar.addView(reload);
                  toolbar.addView(home);
                  toolbar.addView(addressBar, new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1));
                  toolbar.addView(go);
                  toolbar.addView(dev);

                  webView = new WebView(this);

                  devPanel = createDevPanel();
                  devPanel.setVisibility(View.GONE);

                  root.addView(toolbar);
                  root.addView(webView, new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, 0, 1));
                  root.addView(devPanel, new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, 520));

                  setContentView(root);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setLoadsImagesAutomatically(true);
                  settings.setBuiltInZoomControls(true);
                  settings.setDisplayZoomControls(false);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setDatabaseEnabled(true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          addressBar.setText(url);
                          log("PAGE", "finished: " + url);
                          super.onPageFinished(view, url);
                      }

                      @Override
                      public WebResourceResponse shouldInterceptRequest(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          log("REQ", url);

                          if (adBlockEnabled && isBlocked(url)) {
                              log("BLOCK", url);
                              return new WebResourceResponse("text/plain", "utf-8", null);
                          }

                          return super.shouldInterceptRequest(view, request);
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onConsoleMessage(ConsoleMessage message) {
                          log("CONSOLE", message.messageLevel() + ": " + message.message() + " @ " + message.sourceId() + ":" + message.lineNumber());
                          return true;
                      }

                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          if (newProgress == 100) {
                              log("LOAD", "100%");
                          }
                          super.onProgressChanged(view, newProgress);
                      }
                  });

                  webView.setDownloadListener(new DownloadListener() {
                      @Override
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                          request.setMimeType(mimetype);
                          request.addRequestHeader("User-Agent", userAgent);
                          request.setTitle(URLUtil.guessFileName(url, contentDisposition, mimetype));
                          request.setDescription("Downloading");
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(
                                  Environment.DIRECTORY_DOWNLOADS,
                                  URLUtil.guessFileName(url, contentDisposition, mimetype)
                          );

                          DownloadManager manager = (DownloadManager) getSystemService(Context.DOWNLOAD_SERVICE);
                          manager.enqueue(request);
                          Toast.makeText(MainActivity.this, "Download started", Toast.LENGTH_SHORT).show();
                      }
                  });

                  go.setOnClickListener(v -> loadInput());
                  addressBar.setOnEditorActionListener((v, actionId, event) -> {
                      loadInput();
                      return true;
                  });

                  back.setOnClickListener(v -> {
                      if (webView.canGoBack()) webView.goBack();
                  });

                  forward.setOnClickListener(v -> {
                      if (webView.canGoForward()) webView.goForward();
                  });

                  reload.setOnClickListener(v -> webView.reload());
                  home.setOnClickListener(v -> webView.loadUrl("https://google.com"));
                  dev.setOnClickListener(v -> toggleDevPanel());

                  webView.loadUrl("https://google.com");
              }

              private Button smallButton(String text) {
                  Button b = new Button(this);
                  b.setText(text);
                  b.setAllCaps(false);
                  b.setTextSize(12);
                  b.setPadding(4, 2, 4, 2);
                  b.setLayoutParams(new LinearLayout.LayoutParams(ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT));
                  return b;
              }

              private LinearLayout createDevPanel() {
                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setBackgroundColor(Color.rgb(18, 18, 18));
                  panel.setPadding(8, 8, 8, 8);

                  LinearLayout row = new LinearLayout(this);
                  row.setOrientation(LinearLayout.HORIZONTAL);

                  Button info = smallButton("Info");
                  Button dom = smallButton("DOM");
                  Button clear = smallButton("Clear");
                  Button adblock = smallButton("AdBlock");
                  Button close = smallButton("Close");

                  row.addView(info);
                  row.addView(dom);
                  row.addView(clear);
                  row.addView(adblock);
                  row.addView(close);

                  jsInput = new EditText(this);
                  jsInput.setSingleLine(true);
                  jsInput.setHint("Run JS, example: document.title");
                  jsInput.setTextColor(Color.WHITE);
                  jsInput.setHintTextColor(Color.GRAY);

                  Button runJs = smallButton("Run JS");

                  logView = new TextView(this);
                  logView.setTextColor(Color.GREEN);
                  logView.setTextSize(11);
                  logView.setText("Dev panel ready\n");

                  ScrollView scroll = new ScrollView(this);
                  scroll.addView(logView);

                  panel.addView(row);
                  panel.addView(jsInput);
                  panel.addView(runJs);
                  panel.addView(scroll, new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, 0, 1));

                  info.setOnClickListener(v -> showInfo());
                  dom.setOnClickListener(v -> inspectDom());
                  clear.setOnClickListener(v -> {
                      logs.clear();
                      logView.setText("");
                  });
                  adblock.setOnClickListener(v -> {
                      adBlockEnabled = !adBlockEnabled;
                      log("PRIVACY", "AdBlock: " + (adBlockEnabled ? "ON" : "OFF"));
                  });
                  close.setOnClickListener(v -> devPanel.setVisibility(View.GONE));
                  runJs.setOnClickListener(v -> runJavaScript());

                  return panel;
              }

              private void toggleDevPanel() {
                  devPanel.setVisibility(devPanel.getVisibility() == View.VISIBLE ? View.GONE : View.VISIBLE);
              }

              private void showInfo() {
                  String js =
                          "(function(){return JSON.stringify({" +
                                  "title:document.title," +
                                  "url:location.href," +
                                  "cookies:document.cookie ? 'present' : 'none'," +
                                  "links:document.links.length," +
                                  "scripts:document.scripts.length," +
                                  "images:document.images.length" +
                                  "});})()";

                  webView.evaluateJavascript(js, value -> log("INFO", value));
              }

              private void inspectDom() {
                  String js =
                          "(function(){return document.documentElement.outerHTML.substring(0,3000);})()";

                  webView.evaluateJavascript(js, value -> log("DOM", value));
              }

              private void runJavaScript() {
                  String code = jsInput.getText().toString().trim();
                  if (code.isEmpty()) return;

                  webView.evaluateJavascript("(function(){try{return String(" + code + ");}catch(e){return 'ERROR: '+e.message;}})();",
                          new ValueCallback<String>() {
                              @Override
                              public void onReceiveValue(String value) {
                                  log("JS", value);
                              }
                          });
              }

              private void loadInput() {
                  String input = addressBar.getText().toString().trim();
                  if (input.isEmpty()) return;

                  if (input.contains(".") && !input.contains(" ")) {
                      if (!input.startsWith("http://") && !input.startsWith("https://")) {
                          input = "https://" + input;
                      }
                  } else {
                      input = "https://www.google.com/search?q=" + Uri.encode(input);
                  }

                  log("NAV", input);
                  webView.loadUrl(input);
              }

              private boolean isBlocked(String url) {
                  String lower = url.toLowerCase();
                  return lower.contains("doubleclick.net")
                          || lower.contains("googlesyndication")
                          || lower.contains("adservice")
                          || lower.contains("/ads?")
                          || lower.contains("tracking")
                          || lower.contains("analytics");
              }

              private void log(String type, String message) {
                  runOnUiThread(() -> {
                      String line = "[" + type + "] " + message + "\n";
                      logs.add(line);
                      if (logs.size() > 300) logs.remove(0);

                      StringBuilder builder = new StringBuilder();
                      for (String l : logs) builder.append(l);
                      logView.setText(builder.toString());
                  });
              }

              @Override
              public void onBackPressed() {
                  if (devPanel != null && devPanel.getVisibility() == View.VISIBLE) {
                      devPanel.setVisibility(View.GONE);
                  } else if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaBrowserDev-debug-apk
          path: app/build/outputs/apk/debug/*.apk
